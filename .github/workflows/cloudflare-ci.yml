name: cloudflare-ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate unit checks
        run: npm run cf-typegen && npm run typecheck && npm run test:unit

      - name: Validate runtime integration checks
        run: npm run test:integration:runtime
