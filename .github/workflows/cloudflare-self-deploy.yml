name: cloudflare-self-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deploy target for the self repo
        required: false
        default: mirror
        type: choice
        options:
          - mirror
          - live
      reason:
        description: Why this deploy was triggered
        required: false
        type: string
      expected_commit_sha:
        description: Optional safety check for the commit being promoted
        required: false
        type: string
      verify_mirror_first:
        description: Require mirror health before allowing a live promotion
        required: false
        default: true
        type: boolean
      sync_secrets:
        description: Sync GitHub App and webhook secrets before deploy
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate unit checks
        run: npm run cf-typegen && npm run typecheck && npm run test:unit

      - name: Validate runtime integration checks
        run: npm run test:integration:runtime

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    env:
      DEPLOY_TARGET: ${{ github.event_name == 'push' && 'mirror' || inputs.deploy_target || 'mirror' }}
      VERIFY_MIRROR_FIRST: ${{ github.event_name == 'push' && 'false' || inputs.verify_mirror_first || 'true' }}
      SYNC_SECRETS: ${{ github.event_name == 'push' && 'false' || inputs.sync_secrets || 'false' }}
      EXPECTED_COMMIT_SHA: ${{ inputs.expected_commit_sha || '' }}
      SELF_LIVE_URL: https://opengpt-github-mcp-worker.iusung111.workers.dev
      SELF_MIRROR_URL: https://opengpt-github-mcp-worker-mirror.iusung111.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare deploy credentials
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "Missing required GitHub Actions secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Missing required GitHub Actions secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Verify Cloudflare API token
        run: |
          npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify mirror auth secrets
        if: ${{ env.SYNC_SECRETS == 'true' }}
        run: |
          if [ -z "${{ secrets.APP_PRIVATE_KEY_PEM }}" ]; then
            echo "Missing required GitHub Actions secret: APP_PRIVATE_KEY_PEM"
            exit 1
          fi
          if [ -z "${{ secrets.WEBHOOK_SECRET }}" ]; then
            echo "Missing required GitHub Actions secret: WEBHOOK_SECRET"
            exit 1
          fi

      - name: Sync GitHub App private key to target Worker
        if: ${{ env.SYNC_SECRETS == 'true' }}
        continue-on-error: true
        run: |
          TARGET_ARG=""
          if [ "${DEPLOY_TARGET}" = "mirror" ]; then
            TARGET_ARG="--env"
            TARGET_ENV="mirror"
          else
            TARGET_ENV=""
          fi
          if [ -n "${APP_PRIVATE_KEY_PEM}" ]; then
            if [ -n "${TARGET_ENV}" ]; then
              node scripts/cloudflare-secret-put.mjs --secret-name GITHUB_APP_PRIVATE_KEY_PEM --secret-value "${APP_PRIVATE_KEY_PEM}" --target-arg "$TARGET_ARG" --target-arg "$TARGET_ENV"
            else
              node scripts/cloudflare-secret-put.mjs --secret-name GITHUB_APP_PRIVATE_KEY_PEM --secret-value "${APP_PRIVATE_KEY_PEM}"
            fi
          else
            echo "Skipping GitHub App private key sync because the repository secret is not set."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APP_PRIVATE_KEY_PEM: ${{ secrets.APP_PRIVATE_KEY_PEM }}

      - name: Sync webhook secret to target Worker
        if: ${{ env.SYNC_SECRETS == 'true' }}
        continue-on-error: true
        run: |
          TARGET_ARG=""
          if [ "${DEPLOY_TARGET}" = "mirror" ]; then
            TARGET_ARG="--env"
            TARGET_ENV="mirror"
          else
            TARGET_ENV=""
          fi
          if [ -n "${WORKER_WEBHOOK_SECRET}" ]; then
            if [ -n "${TARGET_ENV}" ]; then
              node scripts/cloudflare-secret-put.mjs --secret-name WEBHOOK_SECRET --secret-value "${WORKER_WEBHOOK_SECRET}" --target-arg "$TARGET_ARG" --target-arg "$TARGET_ENV"
            else
              node scripts/cloudflare-secret-put.mjs --secret-name WEBHOOK_SECRET --secret-value "${WORKER_WEBHOOK_SECRET}"
            fi
          else
            echo "Skipping webhook secret sync because the repository secret is not set."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}

      - name: Verify requested commit
        if: ${{ env.EXPECTED_COMMIT_SHA != '' }}
        run: |
          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_COMMIT_SHA" ]; then
            echo "Expected commit $EXPECTED_COMMIT_SHA but found $ACTUAL_SHA"
            exit 1
          fi

      - name: Verify mirror health before live promotion
        if: ${{ env.DEPLOY_TARGET == 'live' && env.VERIFY_MIRROR_FIRST == 'true' }}
        run: |
          echo "Checking mirror health: ${SELF_MIRROR_URL}/healthz"
          curl --fail --show-error "${SELF_MIRROR_URL}/healthz"

      - name: Deploy to Cloudflare Mirror
        if: ${{ env.DEPLOY_TARGET == 'mirror' }}
        run: |
          node scripts/cloudflare-deploy.mjs --deploy-target mirror --deploy-url "${SELF_MIRROR_URL}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Live
        if: ${{ env.DEPLOY_TARGET == 'live' }}
        run: |
          node scripts/cloudflare-deploy.mjs --deploy-target live --deploy-url "${SELF_LIVE_URL}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
