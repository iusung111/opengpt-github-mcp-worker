name: cloudflare-self-deploy

on:
  workflow_run:
    workflows:
      - cloudflare-ci
    types:
      - completed
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deploy target for the self repo
        required: false
        default: mirror
        type: choice
        options:
          - mirror
          - live
      reason:
        description: Why this deploy was triggered
        required: false
        type: string
      expected_commit_sha:
        description: Optional safety check for the commit being promoted
        required: false
        type: string
      verify_mirror_first:
        description: Require mirror health before allowing a live promotion
        required: false
        default: true
        type: boolean
      sync_secrets:
        description: Sync GitHub App and webhook secrets before deploy
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    env:
      DEPLOY_TARGET: ${{ github.event_name == 'workflow_run' && 'mirror' || inputs.deploy_target || 'mirror' }}
      VERIFY_MIRROR_FIRST: ${{ github.event_name == 'workflow_run' && 'false' || inputs.verify_mirror_first || 'true' }}
      SYNC_SECRETS: ${{ github.event_name == 'workflow_run' && 'false' || inputs.sync_secrets || 'false' }}
      EXPECTED_COMMIT_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.expected_commit_sha || '' }}
      MCP_ALLOWED_EMAILS: ${{ secrets.MCP_ALLOWED_EMAILS || vars.MCP_ALLOWED_EMAILS || '' }}
      MCP_ALLOWED_EMAIL_DOMAINS: ${{ secrets.MCP_ALLOWED_EMAIL_DOMAINS || vars.MCP_ALLOWED_EMAIL_DOMAINS || '' }}
      MIRROR_GITHUB_APP_ID: ${{ secrets.MIRROR_GITHUB_APP_ID || vars.MIRROR_GITHUB_APP_ID || '' }}
      MIRROR_GITHUB_APP_INSTALLATION_ID: ${{ secrets.MIRROR_GITHUB_APP_INSTALLATION_ID || vars.MIRROR_GITHUB_APP_INSTALLATION_ID || '' }}
      SELF_LIVE_URL: https://opengpt-github-mcp-worker.iusung111.workers.dev
      SELF_MIRROR_URL: https://opengpt-github-mcp-worker-mirror.iusung111.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare deploy credentials
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "Missing required GitHub Actions secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Missing required GitHub Actions secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Report MCP allowlist mode
        run: |
          if [ -n "${MCP_ALLOWED_EMAILS}" ] || [ -n "${MCP_ALLOWED_EMAIL_DOMAINS}" ]; then
            echo "Deploying with MCP in-worker allowlist mode."
          else
            echo "Deploying with Access-only MCP mode."
          fi

      - name: Report GitHub credential split mode
        run: |
          if [ -n "${MIRROR_GITHUB_APP_ID}" ] && [ -n "${MIRROR_GITHUB_APP_INSTALLATION_ID}" ]; then
            echo "Mirror-specific GitHub App ids are configured."
          else
            echo "Mirror deploy will fall back to default GitHub App ids."
          fi

      - name: Verify Cloudflare API token
        run: |
          npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify mirror auth secrets
        if: ${{ env.SYNC_SECRETS == 'true' }}
        run: |
          if [ -z "${{ secrets.APP_PRIVATE_KEY_PEM }}" ]; then
            echo "Missing required GitHub Actions secret: APP_PRIVATE_KEY_PEM"
            exit 1
          fi
          if [ -z "${{ secrets.WEBHOOK_SECRET }}" ]; then
            echo "Missing required GitHub Actions secret: WEBHOOK_SECRET"
            exit 1
          fi

      - name: Sync mirror GitHub App private key to mirror Worker
        if: ${{ env.SYNC_SECRETS == 'true' && env.DEPLOY_TARGET == 'mirror' }}
        continue-on-error: true
        run: |
          if [ -n "${MIRROR_APP_PRIVATE_KEY_PEM}" ]; then
            node worker/scripts/cloudflare-secret-put.mjs --secret-name MIRROR_GITHUB_APP_PRIVATE_KEY_PEM --secret-value "${MIRROR_APP_PRIVATE_KEY_PEM}" --target-arg "--env" --target-arg "mirror"
          else
            echo "Skipping mirror-specific GitHub App private key sync because the repository secret is not set."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MIRROR_APP_PRIVATE_KEY_PEM: ${{ secrets.MIRROR_GITHUB_APP_PRIVATE_KEY_PEM }}

      - name: Sync GitHub App private key to target Worker
        if: ${{ env.SYNC_SECRETS == 'true' }}
        continue-on-error: true
        run: |
          TARGET_ARG=""
          if [ "${DEPLOY_TARGET}" = "mirror" ]; then
            TARGET_ARG="--env"
            TARGET_ENV="mirror"
          else
            TARGET_ENV=""
          fi
          if [ -n "${APP_PRIVATE_KEY_PEM}" ]; then
            if [ -n "${TARGET_ENV}" ]; then
              node worker/scripts/cloudflare-secret-put.mjs --secret-name GITHUB_APP_PRIVATE_KEY_PEM --secret-value "${APP_PRIVATE_KEY_PEM}" --target-arg "$TARGET_ARG" --target-arg "$TARGET_ENV"
            else
              node worker/scripts/cloudflare-secret-put.mjs --secret-name GITHUB_APP_PRIVATE_KEY_PEM --secret-value "${APP_PRIVATE_KEY_PEM}"
            fi
          else
            echo "Skipping GitHub App private key sync because the repository secret is not set."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          APP_PRIVATE_KEY_PEM: ${{ secrets.APP_PRIVATE_KEY_PEM }}

      - name: Sync webhook secret to target Worker
        if: ${{ env.SYNC_SECRETS == 'true' }}
        continue-on-error: true
        run: |
          TARGET_ARG=""
          if [ "${DEPLOY_TARGET}" = "mirror" ]; then
            TARGET_ARG="--env"
            TARGET_ENV="mirror"
          else
            TARGET_ENV=""
          fi
          if [ -n "${WORKER_WEBHOOK_SECRET}" ]; then
            if [ -n "${TARGET_ENV}" ]; then
              node worker/scripts/cloudflare-secret-put.mjs --secret-name WEBHOOK_SECRET --secret-value "${WORKER_WEBHOOK_SECRET}" --target-arg "$TARGET_ARG" --target-arg "$TARGET_ENV"
            else
              node worker/scripts/cloudflare-secret-put.mjs --secret-name WEBHOOK_SECRET --secret-value "${WORKER_WEBHOOK_SECRET}"
            fi
          else
            echo "Skipping webhook secret sync because the repository secret is not set."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}

      - name: Verify requested commit
        if: ${{ env.EXPECTED_COMMIT_SHA != '' }}
        run: |
          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_COMMIT_SHA" ]; then
            echo "Expected commit $EXPECTED_COMMIT_SHA but found $ACTUAL_SHA"
            exit 1
          fi

      - name: Verify mirror health before live promotion
        if: ${{ env.DEPLOY_TARGET == 'live' && env.VERIFY_MIRROR_FIRST == 'true' }}
        run: |
          echo "Checking mirror health identity: ${SELF_MIRROR_URL}/healthz"
          HEALTH_JSON=$(curl --fail --show-error --silent "${SELF_MIRROR_URL}/healthz")
          echo "${HEALTH_JSON}"
          node -e 'const payload = JSON.parse(process.argv[1]); const expectedCommit = process.argv[2]; if (!payload.ok) throw new Error("mirror health reported ok=false"); if (payload.deploy_environment !== "mirror") throw new Error("mirror health deploy_environment mismatch"); if (expectedCommit && payload.release_commit_sha !== expectedCommit) throw new Error(`mirror release_commit_sha mismatch: expected ${expectedCommit}, got ${payload.release_commit_sha ?? "null"}`);' "${HEALTH_JSON}" "${EXPECTED_COMMIT_SHA}"

      - name: Deploy to Cloudflare Mirror
        if: ${{ env.DEPLOY_TARGET == 'mirror' }}
        run: |
          node worker/scripts/cloudflare-deploy.mjs --deploy-target mirror --deploy-url "${SELF_MIRROR_URL}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SELF_DEPLOY_ENV: mirror
          EXPECTED_COMMIT_SHA: ${{ env.EXPECTED_COMMIT_SHA }}
          MIRROR_GITHUB_APP_ID: ${{ env.MIRROR_GITHUB_APP_ID }}
          MIRROR_GITHUB_APP_INSTALLATION_ID: ${{ env.MIRROR_GITHUB_APP_INSTALLATION_ID }}
          MCP_ALLOWED_EMAILS: ${{ env.MCP_ALLOWED_EMAILS }}
          MCP_ALLOWED_EMAIL_DOMAINS: ${{ env.MCP_ALLOWED_EMAIL_DOMAINS }}

      - name: Deploy to Cloudflare Live
        if: ${{ env.DEPLOY_TARGET == 'live' }}
        run: |
          node worker/scripts/cloudflare-deploy.mjs --deploy-target live --deploy-url "${SELF_LIVE_URL}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SELF_DEPLOY_ENV: live
          EXPECTED_COMMIT_SHA: ${{ env.EXPECTED_COMMIT_SHA }}
          MCP_ALLOWED_EMAILS: ${{ env.MCP_ALLOWED_EMAILS }}
          MCP_ALLOWED_EMAIL_DOMAINS: ${{ env.MCP_ALLOWED_EMAIL_DOMAINS }}
