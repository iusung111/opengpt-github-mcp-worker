name: gui-capture

on:
  workflow_dispatch:
    inputs:
      request_kind:
        description: Request type marker
        required: false
        default: gui_capture
        type: string
      instructions_b64:
        description: Base64 encoded JSON instructions for the remote GUI capture run
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Start local static server
        run: |
          python3 -m http.server 4173 --directory public >/tmp/gui-capture-http.log 2>&1 &
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/gui-capture-http.log
          exit 1

      - name: Run GUI capture
        env:
          INSTRUCTIONS_B64: ${{ inputs.instructions_b64 }}
          LOCAL_HTML_URL: http://127.0.0.1:4173/
        run: node worker/scripts/run-gui-capture.mjs

      - name: Upload GUI capture artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-capture-${{ github.run_id }}
          path: gui-capture-artifact/
          if-no-files-found: error
